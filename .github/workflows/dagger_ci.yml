name: Dagger CI

on:
  push:
    branches: ["main"]
    paths:
      - "dagger/**"
      - "Justfile"
      - ".github/workflows/dagger_ci.yml"
  pull_request:
    branches: ["main"]
    paths:
      - "dagger/**"
      - "Justfile"
      - ".github/workflows/dagger_ci.yml"

jobs:
  lint:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v6

      - uses: astral-sh/setup-uv@v5
      - uses: extractions/setup-just@v3

      - name: Lint check
        run: just dagger-lint-check
